---
# Idempotent: update ECS service to new image tag, wait for stable.
# Re-running with the same image_tag reports changed=0.

- name: Get current task definition for backend
  amazon.aws.ecs_task_definition_info:
    task_definition: "orders-backend-{{ env }}"
    region: "{{ aws_region }}"
  register: current_task_def

- name: Build new task definition with updated image
  set_fact:
    new_image: "{{ current_task_def.task_definition.containerDefinitions[0].image.split(':')[0] }}:{{ image_tag }}"

- name: Check if image already deployed
  set_fact:
    image_already_deployed: >-
      {{ current_task_def.task_definition.containerDefinitions[0].image == new_image }}

- name: Register updated task definition
  amazon.aws.ecs_taskdefinition:
    containers: >-
      {{
        current_task_def.task_definition.containerDefinitions
        | map('combine', {'image': new_image}, recursive=True)
        | list
      }}
    family: "orders-backend-{{ env }}"
    task_role_arn: "{{ current_task_def.task_definition.taskRoleArn }}"
    execution_role_arn: "{{ current_task_def.task_definition.executionRoleArn }}"
    network_mode: awsvpc
    requires_compatibilities: [FARGATE]
    cpu: "{{ current_task_def.task_definition.cpu }}"
    memory: "{{ current_task_def.task_definition.memory }}"
    region: "{{ aws_region }}"
    state: present
  register: new_task_def
  when: not image_already_deployed

- name: Update ECS service to new task definition
  amazon.aws.ecs_service:
    name: "{{ ecs_service_backend }}"
    cluster: "{{ ecs_cluster }}"
    task_definition: "{{ new_task_def.taskdefinition.taskDefinitionArn }}"
    desired_count: "{{ omit }}"
    force_new_deployment: true
    region: "{{ aws_region }}"
    state: present
  register: ecs_update
  when: not image_already_deployed

- name: Wait for service to stabilize
  amazon.aws.ecs_service_info:
    cluster: "{{ ecs_cluster }}"
    service: "{{ ecs_service_backend }}"
    region: "{{ aws_region }}"
    details: true
  register: svc_info
  until: svc_info.services[0].runningCount == svc_info.services[0].desiredCount
  retries: 30
  delay: 10
  when: not image_already_deployed
