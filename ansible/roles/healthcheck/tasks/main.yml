---
# Verify /healthz returns 200 post-deploy. Idempotent (read-only).

- name: Wait for ALB to route to healthy targets
  uri:
    url: "{{ alb_url }}{{ healthcheck_path }}"
    method: GET
    status_code: 200
    validate_certs: "{{ validate_ssl | default(true) }}"
  register: health_result
  until: health_result.status == 200
  retries: "{{ healthcheck_retries }}"
  delay: "{{ healthcheck_delay }}"

- name: Report health status
  debug:
    msg: "Healthcheck passed — {{ alb_url }}{{ healthcheck_path }} returned HTTP 200"
