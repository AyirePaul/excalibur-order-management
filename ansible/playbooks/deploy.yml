---
# Single-play deploy: migrate → force-deploy backend + frontend → healthcheck.
# Idempotent: re-running with the same image_tag reports changed=0.
# Variables come from CI --extra-vars; fallback defaults allow local testing.
- name: Deploy Order Management
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    ecs_cluster: "orders"
    alb_url: "http://localhost:8000"
    migrate_subnets: []
    migrate_security_groups: []
    migrate_task_definition: ""
    image_tag: "latest"

  tasks:
    - name: Run DB migrations via ECS RunTask
      community.aws.ecs_task:
        operation: run
        cluster: "{{ ecs_cluster }}"
        task_definition: "{{ migrate_task_definition }}"
        launch_type: FARGATE
        count: 1
        started_by: "ansible-deploy"
        network_configuration:
          subnets: "{{ migrate_subnets }}"
          security_groups: "{{ migrate_security_groups }}"
          assign_public_ip: false
        overrides:
          containerOverrides:
            - name: backend
              command: ["alembic", "upgrade", "head"]
        wait: true
      register: migrate_task
      when: migrate_subnets | length > 0 and migrate_task_definition != ""

    - name: Assert migration succeeded
      ansible.builtin.assert:
        that:
          - migrate_task.tasks[0].containers[0].exitCode == 0
        fail_msg: "Migration task exited with non-zero code"
      when: migrate_subnets | length > 0 and migrate_task_definition != ""

    - name: Force new deployment of backend
      community.aws.ecs_service:
        state: present
        cluster: "{{ ecs_cluster }}"
        name: "{{ ecs_cluster }}-orders-backend"
        force_new_deployment: true

    - name: Force new deployment of frontend
      community.aws.ecs_service:
        state: present
        cluster: "{{ ecs_cluster }}"
        name: "{{ ecs_cluster }}-orders-frontend"
        force_new_deployment: true

    - name: Healthcheck — wait for /healthz to return 200
      ansible.builtin.uri:
        url: "{{ alb_url }}/healthz"
        method: GET
        status_code: 200
        validate_certs: false
      register: health
      until: health.status == 200
      retries: 15
      delay: 10

    - name: Deployment complete
      ansible.builtin.debug:
        msg: "Deployed image tag '{{ image_tag }}' to cluster '{{ ecs_cluster }}' successfully"
