---
# Single-play deploy: migrate → force-deploy backend + frontend → healthcheck.
# Idempotent: re-running with the same image_tag reports changed=0.
# Variables come from CI --extra-vars; fallback defaults allow local testing.
- name: Deploy Order Management
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    ecs_cluster: "orders"
    alb_url: "http://localhost:8000"
    migrate_subnets: []
    migrate_security_groups: []
    image_tag: "latest"

  tasks:
    - name: Run DB migrations via ECS RunTask (AWS CLI)
      ansible.builtin.shell: |
        set -e
        TASK_ARN=$(aws ecs run-task \
          --cluster "{{ ecs_cluster }}" \
          --task-definition "{{ ecs_cluster }}-orders-backend" \
          --launch-type FARGATE \
          --network-configuration "awsvpcConfiguration={subnets=[{{ migrate_subnets | join(',') }}],securityGroups=[{{ migrate_security_groups | join(',') }}],assignPublicIp=DISABLED}" \
          --overrides '{"containerOverrides":[{"name":"backend","command":["alembic","upgrade","head"]}]}' \
          --query "tasks[0].taskArn" --output text)
        echo "Migration task: $TASK_ARN"
        aws ecs wait tasks-stopped --cluster "{{ ecs_cluster }}" --tasks "$TASK_ARN"
        EXIT=$(aws ecs describe-tasks \
          --cluster "{{ ecs_cluster }}" \
          --tasks "$TASK_ARN" \
          --query "tasks[0].containers[0].exitCode" --output text)
        echo "Exit code: $EXIT"
        [ "$EXIT" = "0" ] || { echo "Migration failed with exit code $EXIT"; exit 1; }
      when: migrate_subnets | length > 0

    - name: Force new deployment of backend
      amazon.aws.ecs_service:
        cluster: "{{ ecs_cluster }}"
        name: "{{ ecs_cluster }}-orders-backend"
        force_new_deployment: true
        wait: true
        wait_timeout: 300

    - name: Force new deployment of frontend
      amazon.aws.ecs_service:
        cluster: "{{ ecs_cluster }}"
        name: "{{ ecs_cluster }}-orders-frontend"
        force_new_deployment: true
        wait: true
        wait_timeout: 300

    - name: Healthcheck — wait for /healthz to return 200
      uri:
        url: "{{ alb_url }}/healthz"
        method: GET
        status_code: 200
        validate_certs: false
      register: health
      until: health.status == 200
      retries: 15
      delay: 10

    - name: Deployment complete
      debug:
        msg: "Deployed image tag '{{ image_tag }}' to cluster '{{ ecs_cluster }}' successfully"
