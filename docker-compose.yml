services:
  db:
    image: postgres:16-alpine
    container_name: orders-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orders}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orders}
      POSTGRES_DB: ${POSTGRES_DB:-orders}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orders} -d ${POSTGRES_DB:-orders}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot service: runs `alembic upgrade head` then exits.
  # backend and adminer wait for this to complete successfully before starting.
  db-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: orders-db-migrate
    restart: "no"
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-orders}:${POSTGRES_PASSWORD:-orders}@db:5432/${POSTGRES_DB:-orders}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  adminer:
    image: adminer:4
    container_name: orders-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db-migrate:
        condition: service_completed_successfully

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: orders-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-orders}:${POSTGRES_PASSWORD:-orders}@db:5432/${POSTGRES_DB:-orders}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db-migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: orders-frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  report-runner:
    build:
      context: ./report-runner
      dockerfile: Dockerfile
    container_name: orders-report-runner
    profiles: [report]
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-orders}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orders}
      POSTGRES_DB: ${POSTGRES_DB:-orders}
      OUTPUT_DIR: /out
    volumes:
      - ./out:/out
    depends_on:
      db-migrate:
        condition: service_completed_successfully

volumes:
  db_data:
