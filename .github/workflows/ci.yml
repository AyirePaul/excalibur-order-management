name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Backend ─────────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - run: uv run ruff check backend/
        working-directory: .
      - run: uv run black --check backend/
        working-directory: .

  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: orders
          POSTGRES_PASSWORD: orders
          POSTGRES_DB: orders
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: uv pip install -e ".[dev]"
        working-directory: backend
      - name: Run tests with coverage
        run: uv run pytest --cov=app --cov-report=html --cov-report=xml --cov-fail-under=60 -v
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://orders:orders@localhost:5432/orders
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/htmlcov

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: tsc --noEmit
        working-directory: frontend

  frontend-test:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run test -- --coverage
        working-directory: frontend
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: https://dev.orders.example.com

  # ── Docker build ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker image build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Terraform validate ───────────────────────────────────────────────────────
  tf-validate:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"
      - name: Validate each module
        run: |
          for mod in infra/modules/*/; do
            echo "Validating $mod"
            cd "$mod"
            terraform init -backend=false -upgrade 2>&1 | tail -5
            terraform validate
            cd - > /dev/null
          done
