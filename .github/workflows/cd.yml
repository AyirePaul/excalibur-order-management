name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── 0. Compute shared image tag ───────────────────────────────────────────
  prepare:
    name: Compute image tag
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.short }}
    steps:
      - name: Shorten SHA
        id: tag
        run: echo "short=${GITHUB_SHA:0:8}" >> "$GITHUB_OUTPUT"

  # ── 1a–c. Build images in parallel ───────────────────────────────────────
  build-backend:
    name: Build backend
    runs-on: ubuntu-latest
    needs: prepare
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-push
        with:
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ecr_registry: ${{ secrets.ECR_REGISTRY }}
          context: backend
          service_name: backend
          image_tag: ${{ needs.prepare.outputs.image_tag }}

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    needs: prepare
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-push
        with:
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ecr_registry: ${{ secrets.ECR_REGISTRY }}
          context: frontend
          service_name: frontend
          image_tag: ${{ needs.prepare.outputs.image_tag }}

  build-report-runner:
    name: Build report-runner
    runs-on: ubuntu-latest
    needs: prepare
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-push
        with:
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ecr_registry: ${{ secrets.ECR_REGISTRY }}
          context: report-runner
          service_name: report-runner
          image_tag: ${{ needs.prepare.outputs.image_tag }}

  # ── 2. Terraform plan (converges on all three builds) ────────────────────
  tf-plan:
    name: Terraform plan
    runs-on: ubuntu-latest
    needs: [prepare, build-backend, build-frontend, build-report-runner]
    environment: production
    env:
      IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"
      - run: terraform init -backend-config=backend.hcl
        working-directory: infra
      - run: >-
          terraform plan
          -var="backend_image=${{ secrets.ECR_REGISTRY }}/orders-backend-orders:${{ env.IMAGE_TAG }}"
          -var="frontend_image=${{ secrets.ECR_REGISTRY }}/orders-frontend-orders:${{ env.IMAGE_TAG }}"
          -var="report_runner_image=${{ secrets.ECR_REGISTRY }}/orders-report-runner-orders:${{ env.IMAGE_TAG }}"
        working-directory: infra

  # ── 3. Manual gate → Terraform apply ────────────────────────────────────
  tf-apply:
    name: Terraform apply
    runs-on: ubuntu-latest
    needs: [prepare, tf-plan]
    environment: production
    env:
      IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"
      - run: terraform init -backend-config=backend.hcl
        working-directory: infra
      - run: >-
          terraform apply -auto-approve
          -var="backend_image=${{ secrets.ECR_REGISTRY }}/orders-backend-orders:${{ env.IMAGE_TAG }}"
          -var="frontend_image=${{ secrets.ECR_REGISTRY }}/orders-frontend-orders:${{ env.IMAGE_TAG }}"
          -var="report_runner_image=${{ secrets.ECR_REGISTRY }}/orders-report-runner-orders:${{ env.IMAGE_TAG }}"
        working-directory: infra

  # ── 4. Ansible deploy ────────────────────────────────────────────────────
  deploy:
    name: Ansible deploy
    runs-on: ubuntu-latest
    needs: [prepare, tf-apply]
    environment: production
    env:
      IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ansible boto3 botocore
      - run: ansible-galaxy collection install -r requirements.yml
        working-directory: ansible
      - name: Read Terraform outputs and run Ansible
        working-directory: ansible
        run: |
          terraform -chdir=../infra init -backend-config=backend.hcl
          ALB_URL=$(terraform -chdir=../infra output -raw alb_url)
          CLUSTER=$(terraform -chdir=../infra output -raw ecs_cluster_name)
          SUBNETS=$(terraform -chdir=../infra output -json private_subnet_ids)
          SG=$(terraform -chdir=../infra output -raw db_client_sg_id)

          ansible-playbook -i inventories/dev/hosts.yml playbooks/deploy.yml \
            --extra-vars "$(jq -nc \
              --arg c "$CLUSTER" \
              --arg a "$ALB_URL" \
              --argjson s "$SUBNETS" \
              --arg sg "$SG" \
              --arg t "$IMAGE_TAG" \
              '{ecs_cluster:$c, alb_url:$a, migrate_subnets:$s, migrate_security_groups:[$sg], image_tag:$t}')"
