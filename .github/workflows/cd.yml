name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── 1. Build & push images ────────────────────────────────────────────────
  build-push:
    name: Build & push to ECR
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: us-east-1
    outputs:
      image_tag: ${{ steps.tag.outputs.short }}
    steps:
      - uses: actions/checkout@v4

      - name: Shorten SHA
        id: tag
        run: echo "short=${GITHUB_SHA:0:8}" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/orders-backend-orders:${{ steps.tag.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/orders-frontend-orders:${{ steps.tag.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Terraform plan ─────────────────────────────────────────────────────
  tf-plan:
    name: Terraform plan
    runs-on: ubuntu-latest
    needs: build-push
    environment: production
    env:
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - run: terraform init -backend-config=backend.hcl
        working-directory: infra

      - run: terraform plan -var="backend_image=${{ secrets.ECR_REGISTRY }}/orders-backend-orders:${{ needs.build-push.outputs.image_tag }}" -var="frontend_image=${{ secrets.ECR_REGISTRY }}/orders-frontend-orders:${{ needs.build-push.outputs.image_tag }}"
        working-directory: infra

  # ── 3. Manual gate → Terraform apply ─────────────────────────────────────
  tf-apply:
    name: Terraform apply
    runs-on: ubuntu-latest
    needs: [build-push, tf-plan]
    # The GitHub Environment "production" enforces required-reviewer approval.
    environment: production
    env:
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - run: terraform init -backend-config=backend.hcl
        working-directory: infra

      - run: terraform apply -auto-approve -var="backend_image=${{ secrets.ECR_REGISTRY }}/orders-backend-orders:${{ needs.build-push.outputs.image_tag }}" -var="frontend_image=${{ secrets.ECR_REGISTRY }}/orders-frontend-orders:${{ needs.build-push.outputs.image_tag }}"
        working-directory: infra

  # ── 4. Ansible deploy ─────────────────────────────────────────────────────
  deploy:
    name: Ansible deploy
    runs-on: ubuntu-latest
    needs: [build-push, tf-apply]
    environment: production
    env:
      IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install ansible boto3 botocore

      - run: ansible-galaxy collection install -r requirements.yml
        working-directory: ansible

      - name: Read Terraform outputs and run Ansible
        working-directory: ansible
        run: |
          terraform -chdir=../infra init -backend-config=backend.hcl
          ALB_URL=$(terraform -chdir=../infra output -raw alb_url)
          CLUSTER=$(terraform -chdir=../infra output -raw ecs_cluster_name)
          SUBNETS=$(terraform -chdir=../infra output -json private_subnet_ids)
          SG=$(terraform -chdir=../infra output -raw ecs_backend_sg_id)

          ansible-playbook -i inventories/dev/hosts.yml playbooks/deploy.yml \
            --extra-vars "$(jq -nc \
              --arg c "$CLUSTER" \
              --arg a "$ALB_URL" \
              --argjson s "$SUBNETS" \
              --arg sg "$SG" \
              --arg t "$IMAGE_TAG" \
              '{ecs_cluster:$c, alb_url:$a, migrate_subnets:$s, migrate_security_groups:[$sg], image_tag:$t}')"
