<?xml version="1.0" encoding="UTF-8"?>
<svg width="960" height="540" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" font-size="12">
  <!-- Background -->
  <rect width="960" height="540" fill="#f8fafc" rx="8"/>
  <text x="480" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e3a8a">Order Management — Architecture (Tier 4)</text>

  <!-- Internet -->
  <rect x="20" y="60" width="120" height="40" rx="6" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="80" y="85" text-anchor="middle" fill="#475569">Internet / Users</text>

  <!-- ALB -->
  <rect x="180" y="60" width="120" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="240" y="85" text-anchor="middle" fill="#1d4ed8">ALB (HTTPS)</text>
  <line x1="140" y1="80" x2="180" y2="80" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Cognito -->
  <rect x="180" y="130" width="120" height="40" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="240" y="155" text-anchor="middle" fill="#92400e">Cognito (OIDC)</text>
  <line x1="240" y1="100" x2="240" y2="130" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ECS Fargate Backend -->
  <rect x="360" y="60" width="150" height="40" rx="6" fill="#d1fae5" stroke="#10b981"/>
  <text x="435" y="85" text-anchor="middle" fill="#065f46">ECS Fargate — API</text>
  <line x1="300" y1="80" x2="360" y2="80" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ADOT sidecar -->
  <rect x="360" y="120" width="150" height="35" rx="6" fill="#f0fdf4" stroke="#86efac"/>
  <text x="435" y="142" text-anchor="middle" font-size="11" fill="#166534">ADOT Sidecar</text>
  <line x1="435" y1="100" x2="435" y2="120" stroke="#64748b" stroke-width="1" stroke-dasharray="4"/>

  <!-- ECS Fargate Frontend -->
  <rect x="360" y="175" width="150" height="40" rx="6" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="435" y="200" text-anchor="middle" fill="#5b21b6">ECS Fargate — Web</text>
  <line x1="300" y1="175" x2="360" y2="195" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- RDS -->
  <rect x="570" y="60" width="130" height="40" rx="6" fill="#fee2e2" stroke="#ef4444"/>
  <text x="635" y="85" text-anchor="middle" fill="#991b1b">RDS Postgres 16</text>
  <text x="635" y="98" text-anchor="middle" font-size="9" fill="#991b1b">(Multi-AZ, KMS)</text>
  <line x1="510" y1="80" x2="570" y2="80" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Secrets Manager -->
  <rect x="570" y="130" width="130" height="40" rx="6" fill="#fce7f3" stroke="#ec4899"/>
  <text x="635" y="155" text-anchor="middle" fill="#831843">Secrets Manager</text>
  <line x1="435" y1="100" x2="435" y2="115" stroke="#64748b" stroke-width="1" stroke-dasharray="4"/>
  <line x1="480" y1="90" x2="570" y2="145" stroke="#64748b" stroke-width="1" stroke-dasharray="4"/>

  <!-- S3 Reports -->
  <rect x="570" y="190" width="130" height="40" rx="6" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="635" y="215" text-anchor="middle" fill="#075985">S3 — Reports</text>
  <line x1="510" y1="200" x2="570" y2="210" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CloudWatch / X-Ray -->
  <rect x="760" y="60" width="150" height="40" rx="6" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="835" y="85" text-anchor="middle" fill="#854d0e">CloudWatch + X-Ray</text>
  <line x1="510" y1="130" x2="760" y2="80" stroke="#64748b" stroke-width="1" stroke-dasharray="4" marker-end="url(#arr)"/>

  <!-- EventBridge -->
  <rect x="360" y="280" width="150" height="40" rx="6" fill="#fdf2f8" stroke="#c026d3"/>
  <text x="435" y="305" text-anchor="middle" fill="#701a75">EventBridge Schedule</text>
  <text x="435" y="317" text-anchor="middle" font-size="9" fill="#701a75">Daily 06:00 UTC</text>

  <!-- Report Runner -->
  <rect x="570" y="280" width="130" height="40" rx="6" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="635" y="305" text-anchor="middle" fill="#14532d">Fargate — Report</text>
  <line x1="510" y1="300" x2="570" y2="300" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="635" y1="320" x2="635" y2="335" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="635" y1="335" x2="700" y2="335" stroke="#64748b" stroke-width="1.5"/>
  <line x1="700" y1="335" x2="700" y2="230" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- GitHub Actions -->
  <rect x="20" y="380" width="130" height="40" rx="6" fill="#e2e8f0" stroke="#475569"/>
  <text x="85" y="405" text-anchor="middle" fill="#1e293b">GitHub Actions</text>
  <text x="85" y="417" text-anchor="middle" font-size="9" fill="#1e293b">OIDC → IAM Role</text>

  <!-- ECR -->
  <rect x="200" y="380" width="120" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="260" y="405" text-anchor="middle" fill="#1d4ed8">ECR Repos</text>
  <line x1="150" y1="400" x2="200" y2="400" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="260" y1="380" x2="260" y2="360" stroke="#64748b" stroke-width="1" stroke-dasharray="4"/>
  <line x1="260" y1="360" x2="435" y2="360" stroke="#64748b" stroke-width="1" stroke-dasharray="4"/>
  <line x1="435" y1="360" x2="435" y2="100" stroke="#64748b" stroke-width="1" stroke-dasharray="4"/>

  <!-- VPC Box -->
  <rect x="155" y="45" width="570" height="245" rx="10" fill="none" stroke="#93c5fd" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="165" y="42" fill="#3b82f6" font-size="10">VPC (us-east-1)</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
